<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1都3県 駅スタンプラリー</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --main-color: #223a70; /*　紺色 */
            --bg-color: #f8f9fa;
            --border-color: #ddd;
        }

        body {
            font-family: -apple-system, "Helvetica Neue", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 20px 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 20px;
            color: var(--main-color);
            margin: 0 0 15px 0;
        }

        /* 統計セクション */
        .stats-grid {
            display: grid;
            gap: 10px;
            padding: 0 15px;
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pref-name {
            width: 60px;
            font-size: 13px;
            font-weight: bold;
        }

        .progress-container {
            flex-grow: 1;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--main-color);
            width: 0%;
            transition: width 0.3s;
        }

        .percent-text {
            width: 80px;
            text-align: right;
            font-size: 12px;
            font-variant-numeric: tabular-nums;
        }

        .overall-stat {
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        /* 路線リスト */
        .line-section {
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .line-header {
            padding: 12px 15px;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .line-name {
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .line-name::after {
            content: '▼';
            font-size: 10px;
            transition: transform 0.3s;
        }

        .line-section.collapsed .line-name::after {
            transform: rotate(-90deg);
        }

        .line-section.collapsed .station-grid {
            display: none;
        }

        .station-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            padding: 10px;
            background: #fafafa;
            border-top: 1px solid #eee;
        }

        .station-chip {
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 8px 2px;
            font-size: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            line-height: 1.2;
            white-space: pre-wrap;
        }

        .station-chip.visited {
            background-color: var(--main-color);
            color: white;
            border-color: var(--main-color);
            font-weight: bold;
        }

        .controls {
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }

        .btn-save {
            background: var(--main-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(198, 0, 121, 0.3);
        }

        @media (min-width: 600px) {
            .station-grid { grid-template-columns: repeat(5, 1fr); }
        }
    </style>
</head>
<body>

<div class="container" id="captureArea">
    <header>
        <h1>1都3県 鉄道駅訪問ログ</h1>
        <div class="stats-grid">
            <div class="stat-row overall-stat">
                <div class="pref-name">全体</div>
                <div class="progress-container"><div id="bar-all" class="progress-fill"></div></div>
                <div id="text-all" class="percent-text">0% (0/0)</div>
            </div>
            <div class="stat-row">
                <div class="pref-name">埼玉</div>
                <div class="progress-container"><div id="bar-11" class="progress-fill"></div></div>
                <div id="text-11" class="percent-text">0%</div>
            </div>
            <div class="stat-row">
                <div class="pref-name">千葉</div>
                <div class="progress-container"><div id="bar-12" class="progress-fill"></div></div>
                <div id="text-12" class="percent-text">0%</div>
            </div>
            <div class="stat-row">
                <div class="pref-name">東京</div>
                <div class="progress-container"><div id="bar-13" class="progress-fill"></div></div>
                <div id="text-13" class="percent-text">0%</div>
            </div>
            <div class="stat-row">
                <div class="pref-name">神奈川</div>
                <div class="progress-container"><div id="bar-14" class="progress-fill"></div></div>
                <div id="text-14" class="percent-text">0%</div>
            </div>
        </div>
    </header>

    <div id="lineList"></div>

    <div class="controls">
        <button class="btn-save" id="saveBtn">画像を保存する</button>
    </div>
</div>

<script>
    let stations = [];
    let lines = {};
    let visitedGids = JSON.parse(localStorage.getItem('station_rally_1to3ken')) || [];
    const TARGET_PREFS = [11, 12, 13, 14];

    async function init() {
        try {
            // CSVの読み込み
            const [stRes, lnRes] = await Promise.all([
                fetch('station.csv').then(r => r.text()),
                fetch('line.csv').then(r => r.text())
            ]);

            // 路線マスタの作成
            lnRes.split('\n').slice(1).forEach(row => {
                const [code, name] = row.split(',');
                if(code) lines[code.trim()] = name.trim();
            });

            // 駅データのフィルタリングと整形
            stations = stRes.split('\n').slice(1).map(row => {
                const [sid, gid, name, lineCd, pref] = row.split(',');
                return {
                    sid: sid?.trim(),
                    gid: gid?.trim(),
                    name: name?.trim(),
                    lineCd: lineCd?.trim(),
                    pref: parseInt(pref?.trim())
                };
            }).filter(s => TARGET_PREFS.includes(s.pref));

            render();
        } catch (e) {
            console.error("データ読み込みエラー:", e);
            alert("CSVファイルの読み込みに失敗しました。ファイルが正しい場所に配置されているか確認してください。");
        }
    }

    function toggleVisit(gid) {
        if (visitedGids.includes(gid)) {
            visitedGids = visitedGids.filter(id => id !== gid);
        } else {
            visitedGids.push(gid);
        }
        localStorage.setItem('station_rally_1to3ken', JSON.stringify(visitedGids));
        updateUI();
    }

    function updateUI() {
        // 全チップの更新
        document.querySelectorAll('.station-chip').forEach(chip => {
            const gid = chip.dataset.gid;
            if (visitedGids.includes(gid)) {
                chip.classList.add('visited');
            } else {
                chip.classList.remove('visited');
            }
        });

        // 統計の計算
        const getStats = (prefId) => {
            const targets = stations.filter(s => prefId === 'all' ? true : s.pref === prefId);
            const uniqueGids = [...new Set(targets.map(s => s.gid))];
            const visited = uniqueGids.filter(id => visitedGids.includes(id)).length;
            const total = uniqueGids.length;
            const percent = total === 0 ? 0 : (visited / total * 100).toFixed(1);
            return { percent, visited, total };
        };

        // バーの更新
        ['all', 11, 12, 13, 14].forEach(id => {
            const { percent, visited, total } = getStats(id);
            document.getElementById(`bar-${id}`).style.width = `${percent}%`;
            document.getElementById(`text-${id}`).innerHTML = `${percent}% <small>(${visited}/${total})</small>`;
        });
    }

    function render() {
        const lineList = document.getElementById('lineList');
        lineList.innerHTML = '';

        // 路線ごとにグループ化
        const grouped = {};
        stations.forEach(s => {
            const lineName = lines[s.lineCd] || `路線コード:${s.lineCd}`;
            if (!grouped[lineName]) grouped[lineName] = [];
            grouped[lineName].push(s);
        });

        // 路線名順にソートして描画
        Object.keys(grouped).sort().forEach(lineName => {
            const section = document.createElement('div');
            section.className = 'line-section collapsed'; // 初期状態は閉じる

            const header = document.createElement('div');
            header.className = 'line-header';
            header.innerHTML = `<span class="line-name">${lineName}</span>`;
            header.onclick = () => section.classList.toggle('collapsed');

            const grid = document.createElement('div');
            grid.className = 'station-grid';

            grouped[lineName].forEach(s => {
                const chip = document.createElement('div');
                chip.className = 'station-chip';
                chip.innerText = s.name;
                chip.dataset.gid = s.gid;
                chip.onclick = (e) => {
                    e.stopPropagation();
                    toggleVisit(s.gid);
                };
                grid.appendChild(chip);
            });

            section.appendChild(header);
            section.appendChild(grid);
            lineList.appendChild(section);
        });

        updateUI();
    }

    // 画像保存
    document.getElementById('saveBtn').onclick = () => {
        const area = document.getElementById('captureArea');
        // 保存時だけアコーディオンを全開にする場合はここを調整
        html2canvas(area, { scale: 2, backgroundColor: "#f8f9fa" }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'station-rally-log.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    };

    window.onload = init;
</script>

</body>

</html>
